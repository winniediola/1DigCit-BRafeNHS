    <!-- Audio Synth Logic -->
    <script>
        let audioCtx = null;
        let bbgOscillator = null;
        let bgGainNode = null;
        let isMusicPlaying = false;
        let playInterval = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Procedural synthesiser playing a cozy lofi-game chord progression
        function startSynthesizer() {
            initAudio();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            bgGainNode = audioCtx.createGain();
            bgGainNode.gain.setValueAtTime(0.08, audioCtx.currentTime); // Low background volume
            bgGainNode.connect(audioCtx.destination);

            let beat = 0;
            const chords = [
                [261.63, 329.63, 392.00, 493.88], // Cmaj7 (Peaceful learning)
                [349.23, 440.00, 523.25, 659.25], // Fmaj7 (Lasallian Community)
                [293.66, 349.23, 440.00, 587.33], // Dm7 (Challenging Situation)
                [329.63, 392.00, 493.88, 587.33]  // Em7 (Resolution)
            ];

            function playChordTone(freq, time, duration) {
                if (!audioCtx || !isMusicPlaying) return;
                let osc = audioCtx.createOscillator();
                let oscGain = audioCtx.createGain();
                
                osc.type = 'triangle'; // Gentle round wave tone
                osc.frequency.setValueAtTime(freq, time);
                
                oscGain.gain.setValueAtTime(0, time);
                oscGain.gain.linearRampToValueAtTime(0.04, time + 0.1);
                oscGain.gain.exponentialRampToValueAtTime(0.0001, time + duration - 0.05);

                osc.connect(oscGain);
                oscGain.connect(bgGainNode);
                osc.start(time);
                osc.stop(time + duration);
            }

            function playTick() {
                if (!isMusicPlaying) return;
                const now = audioCtx.currentTime;
                const chord = chords[Math.floor(beat / 4) % chords.length];
                
                // Play chord pads
                chord.forEach((freq, idx) => {
                    playChordTone(freq, now, 1.8);
                });

                // Play high melody spark occasionally
                if (beat % 2 === 0) {
                    const melodyNote = chord[Math.floor(Math.random() * chord.length)] * 2;
                    playChordTone(melodyNote, now + 0.5, 0.4);
                }
                beat++;
            }

            playTick();
            playInterval = setInterval(playTick, 2000);
        }

        function stopSynthesizer() {
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
            if (bgGainNode) {
                try { bgGainNode.disconnect(); } catch(e){}
            }
        }

        function toggleMusic() {
            const musicIcon = document.getElementById('musicIcon');
            const musicText = document.getElementById('musicText');
            
            if (!isMusicPlaying) {
                isMusicPlaying = true;
                musicIcon.textContent = '🔊';
                musicIcon.classList.add('animate-bounce');
                musicText.textContent = 'Music On';
                try {
                    startSynthesizer();
                } catch(e) {
                    console.log("Audio couldn't start yet: ", e);
                }
            } else {
                isMusicPlaying = false;
                musicIcon.textContent = '🔇';
                musicIcon.classList.remove('animate-bounce');
                musicText.textContent = 'Music Off';
                stopSynthesizer();
            }
        }

        // Quick retro audio effects generator
        function playSfx(type) {
            if (!audioCtx || !isMusicPlaying) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'correct') {
                    // Upward bright scale
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.35);
                } else if (type === 'wrong') {
                    // Downward sliding buzz
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(110, audioCtx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.45);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.45);
                } else if (type === 'click') {
                    // Tiny high pop
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                }
            } catch (e) {
                console.log(e);
            }
        }
    </script>

            if (isCorrect) {
                // Correct path

                let ptsAwarded = userState.attempts === 0 ? 100 : 50;
                userState.score += ptsAwarded;
                
                if (!userState.scenarioScores) userState.scenarioScores = {};
                if (!userState.scenarioScores[userState.currentLevelIndex]) userState.scenarioScores[userState.currentLevelIndex] = {};
                userState.scenarioScores[userState.currentLevelIndex][userState.currentScenarioIndex] = ptsAwarded;

                if (ptsAwarded < 100) {
                    addImperfectScenario(userState.currentLevelIndex, userState.currentScenarioIndex);
                }
                renderFeedback(true, ptsAwarded, scenario.explanation);
            } else {
                // Incorrect path
                playSfx('wrong');
                userState.attempts++;
                userState.levelMistakes++;
                updateHUD();

                // 2 Mistakes per Level threshold check
                if (userState.levelMistakes >= 2) {
                    renderLevelFailureScreen();
                    return;

                if (userState.attempts < 2) {
                    // Give a hint and ask to try again
                    renderFeedback(false, 0, scenario.hint, true);
                } else {
                    // Out of attempts, mark as imperfect
                    addImperfectScenario(userState.currentLevelIndex, userState.currentScenarioIndex);
                    if (!userState.scenarioScores) userState.scenarioScores = {};
                    if (!userState.scenarioScores[userState.currentLevelIndex]) userState.scenarioScores[userState.currentLevelIndex] = {};
                    userState.scenarioScores[userState.currentLevelIndex][userState.currentScenarioIndex] = 0;

                    renderFeedback(false, 0, scenario.explanation, false, scenario.options[scenario.correct].text);

                    <div id="certificateContainer" class="w-full glass-panel p-6 rounded-2xl border-2 border-emerald-500/50 bg-gradient-to-br from-slate-950 to-emerald-950/20 relative shadow-2xl overflow-hidden max-w-xl">
                        <!-- Background Decorative Star -->
                        <div class="absolute -right-12 -bottom-12 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none"></div>
                        
                        <div class="border-2 border-emerald-400/20 p-4 rounded-xl space-y-4 text-center">
                            <!-- Mini Header -->
                            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                                <span class="text-[9px] text-emerald-400 font-bold uppercase tracking-widest">De La Salle Santiago Zobel School</span>
                                <span class="text-[9px] text-purple-400 font-bold uppercase tracking-widest">Education Technology Unit</span>
                            </div>

                            <div class="space-y-2 py-4">
                                <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">This certifies that</span>
                                <h3 class="text-xl md:text-2xl font-black heading-font text-white underline decoration-emerald-400 decoration-2 underline-offset-4">
                                    ${userState.playerName}
                                </h3>
                                <p class="text-xs text-slate-300 max-w-sm mx-auto leading-relaxed mt-2">
                                    has successfully attained a perfect score of <strong>2500 / 2500</strong>, demonstrating outstanding competency in NxGBL digital citizenship, MLD stewardship, and AI ethical declaration rules.
                                </p>
                            </div>

                            <!-- Avatar stamp -->
                            <div class="flex justify-center items-center gap-3 py-1">
                                <div class="w-12 h-12 rounded-full border border-teal-500 bg-slate-900 p-1">
                                    ${AVATARS[userState.avatar].svg}
                                </div>
                                <div class="text-left text-xs">
                                    <p class="font-bold text-white uppercase">${AVATARS[userState.avatar].name}</p>
                                    <p class="text-[10px] text-slate-400 italic">Certified Lasallian Digital Leader</p>
                                </div>
                            </div>

                            <!-- Pledge Commitment list -->
                            <div class="text-left bg-slate-900/60 p-3 rounded-lg border border-slate-800 text-[10px] text-slate-300 space-y-1">
                                <p class="font-bold text-emerald-400 uppercase tracking-wider mb-1">My Digital Leadership Commitment:</p>
                                <p>✔ I use my MLD for learning anytime, anywhere, and as an active scholar.</p>
                                <p>✔ I follow the classroom digital footprint standards in school and GCs.</p>
                                <p>✔ I honestly declare AI use via the Tool, Purpose, Process, and Ownership framework.</p>
                            </div>

                            <!-- Signature Area -->
                            <div class="pt-4 border-t border-slate-800/50 flex justify-between items-center text-[9px] text-slate-400">
                                <div class="text-left">
                                    <p class="font-bold text-slate-300">iTHINK Virtues Council</p>
                                    <p class="text-slate-500">Integrity & Honor Board</p>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold text-emerald-400">EdTech Unit</p>
                                    <p class="text-slate-500">DLSZ NxGBL Program</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="flex flex-wrap gap-4 justify-center">
                        <button onclick="window.print()" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-extrabold text-xs rounded-xl uppercase tracking-wider transition">
                            Print / Save Certificate 🖨️
                        </button>
                        <button onclick="restartFullGame()" class="px-6 py-3 bg-slate-900 hover:bg-slate-800 border border-slate-700 text-slate-100 font-extrabold text-xs rounded-xl uppercase tracking-wider transition">
                            Restart Simulator ↺
                        </button>
                    </div>
                </div>
            `;
        }

        function restartFullGame() {
            playSfx('click');
            userState = {
                playerName: "Lasallian Student",
                avatar: "riku",
                score: 0,
                currentLevelIndex: 0,
                currentScenarioIndex: 0,
                attempts: 0,
                gameCompleted: false,
                unlockedLevelIndex: 0,
                levelMistakes: 0,
                levelStartScore: 0,
                imperfectScenarios: [],
                isReviewMode: false,
                currentReviewIndex: 0,
                scenarioScores: {}
            };
            renderOnboarding();
        }
    </script>
</body>
</html>
